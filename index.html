<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schießnachweis - SSV Schmidhausen</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ssv-green: #1b7a3d;
      --ssv-yellow: #ffcc00; 
      --ssv-light: #f0f2f0;
      --ssv-white: #ffffff;
      --ssv-text: #2c3e50;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--ssv-light);
      color: var(--ssv-text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background-color: var(--ssv-green);
      color: var(--ssv-white);
      width: 100%;
      padding: 15px 0;
      text-align: center;
      border-bottom: 4px solid var(--ssv-yellow);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;      justify-content: center;
      align-items: center;
    }

    header img {
      height: 50px;
      width: auto;
      margin-right: 15px;
      border-radius: 50%;
      background: white;
      padding: 2px;
    }

    header div {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    h2, h3 {
      margin: 5px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    h2 { font-size: 1.2em; line-height: 1; }
    h3 { font-size: 1.1em; color: var(--ssv-green); border-bottom: 2px solid var(--ssv-yellow); padding-bottom: 5px; display: inline-block; }

    .container {
      width: 92%;
      max-width: 480px;
      background: var(--ssv-white);
      margin: 20px 0;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: 600;
      font-size: 0.85em;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      background-color: #fcfcfc;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--ssv-green);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(27, 122, 61, 0.1);
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 25px;
      background-color: var(--ssv-green);
      color: var(--ssv-white);
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    button:hover { background-color: #145c2e; }
    button:active { transform: translateY(1px); }

    #list { list-style: none; padding: 0; margin-top: 20px; }

    #list li {
      background: #fdfdfd;
      margin-bottom: 10px;
      padding: 15px;
      border-left: 5px solid var(--ssv-green);
      border-radius: 6px;
      font-size: 0.9em;
      line-height: 1.5;
      border: 1px solid #eee;
    }

    .small-info { font-size: 0.75em; color: #888; margin-top: 10px; }
    #login { text-align: center; }
    #login input { margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <img src="WhatsApp-Image-2019-10-02-at-16.27.34-1024x1024.jpeg" alt="SSV Logo"> 
  <div>
    <h2>SSV Schmidhausen</h2>
    <span style="font-size: 0.8em; opacity: 0.9;">Digitaler Schießnachweis</span>
  </div>
</header>

<div class="container" id="login">
  <h3>Mitglied Login</h3>
  <input id="email" type="email" placeholder="E-Mail Adresse">
  <input id="password" type="password" placeholder="Passwort">
  <button id="loginBtn">Anmelden</button>
</div>

<div class="container" id="app" style="display:none;">
  <h3>Neuer Eintrag</h3>
  <label for="datum">Datum *</label>
  <input id="datum" type="date">

  <label for="gastschuetze">Name Gastschütze (Pflicht für Gäste)</label>
  <input id="gastschuetze" placeholder="Vor- und Nachname"> 

  <label for="stand">Schießstand *</label>
  <select id="stand">
    <option value="">-- Bitte wählen --</option>
    <option value="Kurzwaffe">Kurzwaffe</option>
    <option value="Langwaffe">Langwaffe</option>
  </select>

  <label for="disziplin">Disziplin *</label>
  <input id="disziplin" placeholder="z.B. WT4.1">

  <label for="waffe">Waffe/Kaliber *</label>
  <input id="waffe" placeholder="z.B. CZ Shadow 9mm">

  <label for="aufsicht">Aufsicht *</label>
  <input id="aufsicht" placeholder="Name der Aufsicht">

  <label for="bemerkung">Bemerkung (Optional)</label>
  <input id="bemerkung" placeholder="Sonstiges...">

  <p class="small-info">* Pflichtfelder</p>
  <button id="saveBtn">Eintrag Speichern</button>

  <h3 style="margin-top: 40px;">Meine Einträge</h3>
  <ul id="list"></ul>
</div>

<script>
const client = window.supabase.createClient(
  "https://zgpjnjttafrpjcswpaff.supabase.co",
  "sb_publishable_NRbm9gXaYGUSjnqbqrqxdA_-dDCVvkX"
);

// --- HILFSFUNKTION: XSS SCHUTZ ---
function escapeHTML(str) {
  if (!str) return "";
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- LOGOUT TIMER (5 MINUTEN) ---
let idleTimer;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  // 300.000 ms = 5 Minuten
  idleTimer = setTimeout(autoLogout, 300000);
}

async function autoLogout() {
  await client.auth.signOut();
  alert("Du wurdest wegen Inaktivität automatisch abgemeldet.");
  location.reload(); // Seite neu laden für sauberen Reset
}

// Events, die den Timer zurücksetzen
function setupIdleCounter() {
  window.onload = resetIdleTimer;
  window.onmousemove = resetIdleTimer;
  window.onmousedown = resetIdleTimer;
  window.ontouchstart = resetIdleTimer;
  window.onclick = resetIdleTimer;
  window.onkeypress = resetIdleTimer;
}

// --- LOGIN ---
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    if (error.message.toLowerCase().includes("email")) {
      alert("Fehler: E-Mail falsch.");
    } else if (error.message.toLowerCase().includes("credential") || error.message.toLowerCase().includes("password")) {
      alert("Fehler: Passwort falsch.");
    } else {
      alert("Login-Fehler: " + error.message);
    }
  } else {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    setupIdleCounter(); // Timer erst nach Login starten
    loadEntries();
  }
}

// --- SPEICHERN ---
async function save() {
  const datumRaw = document.getElementById("datum").value;
  const stand = document.getElementById("stand").value;
  const disziplin = document.getElementById("disziplin").value.trim();
  const waffe = document.getElementById("waffe").value.trim();
  const aufsicht = document.getElementById("aufsicht").value.trim();
  const gastName = document.getElementById("gastschuetze").value.trim();
  const bemerkung = document.getElementById("bemerkung").value.trim();

  if (datumRaw) {
    const [jahr, monat, tag] = datumRaw.split('-').map(Number);
    const gewähltesDatum = new Date(jahr, monat - 1, tag); 
    const heute = new Date();
    heute.setHours(0, 0, 0, 0);

    if (gewähltesDatum.getTime() > heute.getTime()) {
      alert("Fehler: Keine Zukunftseinträge!");
      return;
    }

    const wochentag = gewähltesDatum.getDay();
    const erlaubteTage = [0, 3, 5]; 
    if (!erlaubteTage.includes(wochentag)) {
      alert("Einträge nur Mi, Fr oder So erlaubt!");
      return;
    }
  }

  if (!datumRaw || !stand || !disziplin || !waffe || !aufsicht) {
    alert("Pflichtfelder fehlen!");
    return;
  }

  const { data: { user } } = await client.auth.getUser();
  if (user.email.toLowerCase() === "gast@ssv.de" && gastName === "") {
    alert("Gast-Name fehlt!");
    return;
  }

  const { error } = await client.from("entries").insert([{
    user_id: user.id,
    datum: datumRaw,
    gastschuetze: gastName,
    schiessstand: stand,
    disziplin: disziplin,
    waffe: waffe,
    aufsicht: aufsicht,
    bemerkung: bemerkung
  }]);

  if (error) {
    alert("Fehler: " + error.message);
  } else {
    alert("Erfolgreich gespeichert!");
    document.getElementById("gastschuetze").value = "";
    document.getElementById("bemerkung").value = "";
    loadEntries();
  }
}

// --- LADEN (MIT SICHERER ANZEIGE) ---
async function loadEntries() {
  const { data, error } = await client
    .from("entries")
    .select("*")
    .order("datum", { ascending: false });

  if (error) return;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(e => {
    const li = document.createElement("li");
    // Alle Werte werden durch escapeHTML geschleust
    const safeDatum = escapeHTML(e.datum);
    const safeGast = e.gastschuetze ? ` | <b>Gast:</b> ${escapeHTML(e.gastschuetze)}` : "";
    const safeStand = escapeHTML(e.schiessstand);
    const safeDisz = escapeHTML(e.disziplin);
    const safeWaffe = escapeHTML(e.waffe);

    li.innerHTML = `<strong>${safeDatum}</strong>${safeGast}<br><small>${safeStand} | ${safeDisz} | ${safeWaffe}</small>`;
    list.appendChild(li);
  });
}

document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("saveBtn").addEventListener("click", save);
</script>

</body>
</html>
