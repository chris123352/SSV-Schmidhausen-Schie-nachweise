<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schießnachweis</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Schießnachweis</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">
  <button id="loginBtn">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Neuer Eintrag</h3>

  <input id="datum" type="date"><br>
  <input id="gastschuetze" placeholder="Name Gastschütze (Optional)"><br> 
  <input id="stand" placeholder="Schießstand"><br>
  <input id="disziplin" placeholder="Disziplin"><br>
  <input id="waffe" placeholder="Waffe/Kaliber"><br>
  <input id="aufsicht" placeholder="Aufsicht"><br>
  <input id="bemerkung" placeholder="Bemerkung (Optional)"><br>

  <button id="saveBtn">Speichern</button>

  <h3>Meine Einträge</h3>
  <ul id="list"></ul>
</div>

<script>
const client = window.supabase.createClient(
  "https://zgpjnjttafrpjcswpaff.supabase.co",
  "sb_publishable_NRbm9gXaYGUSjnqbqrqxdA_-dDCVvkX"
);

// LOGIN mit getrennten Fehlermeldungen
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    // Supabase gibt je nach Fehler unterschiedliche Texte zurück
    if (error.message.toLowerCase().includes("email")) {
      alert("Fehler: Die E-Mail-Adresse ist falsch oder nicht registriert.");
    } else if (error.message.toLowerCase().includes("invalid login credentials") || error.message.toLowerCase().includes("password")) {
      alert("Fehler: Das Passwort ist nicht korrekt.");
    } else {
      alert("Login-Fehler: " + error.message);
    }
  } else {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadEntries();
  }
}

// SPEICHERN mit Gast-Sonderregel
async function save() {
  // Werte holen und trimmen
  const datum = document.getElementById("datum").value.trim();
  const stand = document.getElementById("stand").value.trim();
  const disziplin = document.getElementById("disziplin").value.trim();
  const waffe = document.getElementById("waffe").value.trim();
  const aufsicht = document.getElementById("aufsicht").value.trim();
  const gastName = document.getElementById("gastschuetze").value.trim();
  const bemerkung = document.getElementById("bemerkung").value.trim();

  // 1. Allgemeine Pflichtfelder prüfen (für alle User)
  if (!datum || !stand || !disziplin || !waffe || !aufsicht) {
    alert("Bitte fülle alle Pflichtfelder aus (Datum, Schießstand, Disziplin, Waffe und Aufsicht).");
    return;
  }

  // User-Daten abrufen, um die E-Mail zu prüfen
  const { data: { user } } = await client.auth.getUser();
  const userEmail = user.email.toLowerCase();

  // 2. SPEZIELLE REGEL: Wenn der User Gast@ssv.de ist, MUSS der Gastname ausgefüllt sein
  if (userEmail === "gast@ssv.de" && gastName === "") {
    alert("Achtung: Als Gast musst du zwingend den Namen des Gastschützen angeben!");
    return;
  }

  // Wenn alles okay ist -> Speichern
  const { error } = await client.from("entries").insert([{
    user_id: user.id,
    datum: datum,
    gastschuetze: gastName,
    schiessstand: stand,
    disziplin: disziplin,
    waffe: waffe,
    aufsicht: aufsicht,
    bemerkung: bemerkung
  }]);

  if (error) {
    alert("Fehler beim Speichern: " + error.message);
  } else {
    // Felder leeren (außer Datum evtl.)
    document.getElementById("gastschuetze").value = "";
    document.getElementById("bemerkung").value = "";
    alert("Eintrag erfolgreich gespeichert!");
    loadEntries();
  }
}

async function loadEntries() {
  const { data, error } = await client
    .from("entries")
    .select("*")
    .order("datum", { ascending: false });

  if (error) return;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(e => {
    const li = document.createElement("li");
    const gast = e.gastschuetze ? ` | Gast: ${e.gastschuetze}` : "";
    li.textContent = `${e.datum}${gast} | ${e.disziplin} | ${e.waffe}`;
    list.appendChild(li);
  });
}

document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("saveBtn").addEventListener("click", save);
</script>

</body>
</html>
