<!DOCTYPE html>
<html lang="de">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://zgpjnjttafrpjcswpaff.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schießnachweis - SSV Schmidhausen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root{--g:#1b7a3d;--y:#ffcc00;--l:#f0f2f0;--w:#fff;--t:#2c3e50;--r:#ac2b1a}
        body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--l);color:var(--t);margin:0;padding:0;display:flex;flex-direction:column;align-items:center}
        header{background:var(--g);color:var(--w);width:100%;padding:15px 0;text-align:center;border-bottom:4px solid var(--y);box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;justify-content:center;align-items:center}
        header img{height:50px;width:auto;margin-right:15px;border-radius:50%;background:#fff;padding:2px}
        header div{display:flex;flex-direction:column;text-align:left}
        h2,h3{margin:5px 0;text-transform:uppercase;letter-spacing:.5px}
        h2{font-size:1.2em;line-height:1}h3{font-size:1.1em;color:var(--g)}
        ._c{width:92%;max-width:480px;background:var(--w);margin:20px 0;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.08);box-sizing:border-box;display:none}
        ._hr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:20px;border-bottom:2px solid var(--y);padding-bottom:10px;flex-wrap:wrap}
        ._ub_style{display:flex;background:#f8f9fa;border:1px solid #ced4da;padding:8px;border-radius:8px;flex-direction:column;align-items:flex-end;min-width:120px}
        ._dmn_text{font-weight:700;font-size:.75em;color:var(--g);word-break:break-all}
        ._lo_btn{background:var(--r);color:#fff;border:none;padding:8px 35px;border-radius:4px;font-size:.8em;cursor:pointer;margin-top:4px;width:100%;min-width:150px;font-weight:700;transition: opacity 0.2s;}
        ._lo_btn:hover{opacity: 0.9;}
        #_la{display:block}
        label{display:block;margin-top:18px;font-weight:600;font-size:.85em;color:#555}
        input,select{width:100%;padding:12px;margin-top:6px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:16px;background-color:#fcfcfc}
        ._mb{width:100%;padding:16px;margin-top:25px;background:var(--g);color:var(--w);border:none;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;transition:background .2s}
        ._mb:hover{background:#145c2e}._mb:disabled{background:#ccc;cursor:not-allowed}
        ._nb{width:92%;max-width:480px;margin-top:15px;display:none;gap:10px}
        ._nb button{flex:1;padding:10px;font-size:.8em;background:#666;color:#fff;border:none;border-radius:8px;cursor:pointer}
        ._nb button._ax{background:var(--g)}
        ._ba{background:var(--g);color:#fff;border:none;padding:12px;border-radius:8px;font-size:.9em;font-weight:700;text-transform:uppercase;cursor:pointer;margin-top:12px;width:100%;box-shadow:0 2px 5px rgba(0,0,0,.15)}
        ._sb_badge{float:right;font-size:.7em;padding:2px 6px;border-radius:4px;text-transform:uppercase;font-weight:700}
        ._s0{background:#ffeeba;color:#856404}._s1{background:#d4edda;color:#155724}
        #_ls li,#_al li{background:#fdfdfd;margin-bottom:10px;padding:15px;border-left:5px solid var(--g);border-radius:6px;font-size:.9em;border:1px solid #eee;list-style:none}
        #_ls,#_al{padding:0}
    </style>
</head>
<body>

<header>
    <img src="WhatsApp-Image-2019-10-02-at-16.27.34-1024x1024.jpeg" alt="SSV Logo">
    <div><h2>SSV Schmidhausen</h2><span style="font-size: 0.8em; opacity: 0.9;">Digitaler Schießnachweis</span></div>
</header>

<div class="_c" id="_la">
    <h3>Mitglied Login</h3>
    <input id="_e" type="email" placeholder="E-Mail Adresse">
    <input id="_p" type="password" placeholder="Passwort">
    <button id="_lb" class="_mb">Anmelden</button>
    <p style="text-align: center; margin-top: 15px;"><a href="#" id="_fp" style="color: var(--g); font-size: 0.8em; text-decoration: none;">Passwort vergessen?</a></p>
</div>

<div class="_nb" id="_an">
    <button id="_nu" class="_ax">Meine Einträge</button>
    <button id="_na">Admin-Zentrale</button>
</div>

<div class="_c" id="_a">
    <div class="_hr">
        <h3>Neuer Eintrag</h3>
        <div class="_ub_style"><span class="_dmn_text _cur_user"></span><button class="_lo_btn">Logout</button></div>
    </div>
    <label for="_d">Datum *</label><input id="_d" type="date">
    <label for="_g">Name Gastschütze</label><input id="_g" placeholder="Vor- und Nachname">
    <label for="_s">Schießstand *</label><select id="_s"><option value="">-- Bitte wählen --</option><option value="Kurzwaffe">Kurzwaffe</option><option value="Langwaffe">Langwaffe</option><option value="Lufthalle">Lufthalle</option></select>
    <label for="_di">Disziplin *</label><input id="_di" placeholder="z.B. WT4.1">
    <label for="_w">Waffe/Kaliber *</label><input id="_w" placeholder="z.B. CZ Shadow 9mm">
    <label for="_au">Aufsicht *</label><input id="_au" placeholder="Name der Aufsicht">
    <label for="_be">Bemerkung (Optional)</label><input id="_be" placeholder="Sonstiges...">
    <button id="_sb" class="_mb">Eintrag Speichern</button>
    <h3 id="_met" style="margin-top: 40px; border-bottom: 2px solid var(--y); padding-bottom:5px;">Meine Einträge</h3>
    <ul id="_ls"></ul>
</div>

<div class="_c" id="_av">
    <div class="_hr">
        <h3>Export & Freigabe</h3>
        <div class="_ub_style"><span class="_dmn_text _cur_user"></span><button class="_lo_btn">Logout</button></div>
    </div>
    <label>Mitglied filtern:</label>
    <select id="_ms"><option value="all">-- Alle Mitglieder --</option></select>
    
    <label>Zeitraum für Export *:</label>
    <select id="_ex_period">
        <option value="">-- Zeitraum wählen --</option>
        <option value="6">Letzte 6 Monate</option>
        <option value="12">Letzte 12 Monate</option>
        <option value="all">Gesamter Zeitraum</option>
    </select>

    <div style="display: flex; gap: 10px; margin-top:10px;">
        <button id="_xe" style="flex:1; background:#1d6f42; color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">Excel</button>
        <button id="_pdf" style="flex:1; background:var(--r); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">PDF</button>
    </div>
    <h3 style="margin-top: 30px;">Offene Freigaben</h3>
    <ul id="_al"></ul>
</div>

<script>
const _c = window.supabase.createClient("https://zgpjnjttafrpjcswpaff.supabase.co","sb_publishable_NRbm9gXaYGUSjnqbqrqxdA_-dDCVvkX");

const _clickTrack = { login: [], save: [] };
function _isLimited(type) {
    const now = Date.now();
    _clickTrack[type] = _clickTrack[type].filter(t => now - t < 60000);
    if (_clickTrack[type].length >= 3) {
        alert("Zu viele Anfragen. Bitte warte 60 Sekunden.");
        return true;
    }
    _clickTrack[type].push(now);
    return false;
}

window.onload = async () => {
    const { data: { session } } = await _c.auth.getSession();
    if (session) _initApp(session.user);
    else document.getElementById("_lb").onclick = _handleLogin;
};

async function _handleLogin() {
    if (_isLimited('login')) return;
    const e = document.getElementById("_e").value, p = document.getElementById("_p").value;
    const { data, error } = await _c.auth.signInWithPassword({ email: e, password: p });
    if (error) return alert("Login fehlgeschlagen.");
    _initApp(data.user);
}

async function _initApp(u) {
    document.getElementById("_la").style.display = "none";
    document.getElementById("_a").style.display = "block";
    document.querySelectorAll("._cur_user").forEach(el => el.textContent = u.email);
    
    document.querySelectorAll("._lo_btn").forEach(btn => btn.onclick = async () => {
        await _c.auth.signOut();
        location.reload();
    });

    const { data: p } = await _c.from('profiles').select('is_admin').eq('id', u.id).maybeSingle();
    if (p && p.is_admin) {
        document.getElementById("_an").style.display = "flex";
        _loadAdminPanel();
    }
    _startInactivityTimer();
    _loadUserEntries();
    document.getElementById("_sb").onclick = _saveEntry;
}

async function _saveEntry() {
    if (_isLimited('save')) return;
    const f = { d: document.getElementById("_d"), s: document.getElementById("_s"), di: document.getElementById("_di"), w: document.getElementById("_w"), au: document.getElementById("_au"), g: document.getElementById("_g"), b: document.getElementById("_be") };
    if (!f.d.value || !f.s.value || !f.di.value || !f.w.value || !f.au.value) return alert("Pflichtfelder fehlen!");
    const { data: { user } } = await _c.auth.getUser();
    const { error } = await _c.from("entries").insert([{ user_id: user.id, datum: f.d.value, gastschuetze: f.g.value.trim(), schiessstand: f.s.value, disziplin: f.di.value.trim(), waffe: f.w.value.trim(), aufsicht: f.au.value.trim(), bemerkung: f.b.value.trim(), status: 'offen' }]);
    if (error) alert("Fehler beim Speichern.");
    else { alert("Erfolgreich gespeichert!"); Object.values(f).forEach(x => x.value = ""); _loadUserEntries(); }
}

async function _loadUserEntries() {
    const { data: { user } } = await _c.auth.getUser();
    if (user.email === "gast@ssv.de") return;
    const { data } = await _c.from("entries").select("*").eq('user_id', user.id).order("datum", { ascending: false });
    const l = document.getElementById("_ls"); l.innerHTML = "";
    if (data) data.forEach(e => {
        const i = document.createElement("li"), c = e.status === 'bestätigt' ? '_s1' : '_s0';
        i.innerHTML = `<span class="_sb_badge ${c}">${e.status || 'offen'}</span><strong>${e.datum}</strong><br><small>${e.disziplin} | ${e.waffe}</small>`;
        l.appendChild(i);
    });
}

async function _loadAdminPanel() {
    const { data } = await _c.from('profiles').select('id,email');
    const s = document.getElementById("_ms");
    if (data) {
        s.innerHTML = '<option value="all">-- Alle Mitglieder --</option>';
        data.forEach(m => { let o = document.createElement("option"); o.value = m.id; o.textContent = m.email; s.appendChild(o); });
    }
    _refreshOpenRequests();
}

async function _refreshOpenRequests() {
    const { data: e } = await _c.from('entries').select('*').eq('status', 'offen').order('datum', { ascending: true });
    const { data: p } = await _c.from('profiles').select('id,email');
    const l = document.getElementById("_al");
    l.innerHTML = e?.length ? "" : "<li>Keine offenen Anfragen.</li>";
    if (e) e.forEach(x => {
        const r = p.find(z => z.id === x.user_id), i = document.createElement("li");
        // E-Mail in Schwarz und Details hinzugefügt
        i.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <strong style="color: var(--t);">${r ? r.email : 'Unbekannt'}</strong>
                <span>${x.datum}</span>
            </div>
            <div style="font-size: 0.85em; color: #444; line-height: 1.5; background: #f0f0f0; padding: 8px; border-radius: 4px;">
                ${x.gastschuetze ? `<strong>Gast:</strong> ${x.gastschuetze}<br>` : ''}
                <strong>Stand:</strong> ${x.schiessstand} | <strong>Disziplin:</strong> ${x.disziplin}<br>
                <strong>Waffe:</strong> ${x.waffe}<br>
                <strong>Aufsicht:</strong> ${x.aufsicht}
            </div>
            <button onclick="_approveEntry('${x.id}')" class="_ba">✓ Jetzt Freigeben</button>`;
        l.appendChild(i);
    });
}

window._approveEntry = async (id) => {
    await _c.from('entries').update({ status: 'bestätigt' }).eq('id', id);
    _refreshOpenRequests();
};

async function _getExportData() {
    const period = document.getElementById("_ex_period").value;
    if (!period) { alert("Bitte wähle erst einen Zeitraum aus!"); return null; }
    const { data: profiles } = await _c.from('profiles').select('id,email');
    let query = _c.from('entries').select('*');
    if (period !== "all") {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - parseInt(period));
        query = query.gte('datum', cutoff.toISOString().split('T')[0]);
    }
    const userFilter = document.getElementById("_ms").value;
    if (userFilter !== "all") query = query.eq('user_id', userFilter);
    const { data: entries, error } = await query.order('datum', { ascending: false });
    if (error || !entries || entries.length === 0) { alert("Keine Daten gefunden."); return null; }
    return entries.map(row => {
        const u = profiles.find(p => p.id === row.user_id);
        return {
            Datum: row.datum,
            Email: u ? u.email : 'Unbekannt',
            Schießstand: row.schiessstand,
            Disziplin: row.disziplin,
            Waffe: row.waffe,
            Aufsicht: row.aufsicht,
            Gast: row.gastschuetze || '-',
            Status: row.status
        };
    });
}

document.getElementById("_xe").onclick = async () => {
    const data = await _getExportData();
    if (!data) return;
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Schießnachweis");
    XLSX.writeFile(wb, `SSV_Export_${new Date().toISOString().split('T')[0]}.xlsx`);
};

document.getElementById("_pdf").onclick = async () => {
    const data = await _getExportData();
    if (!data) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    doc.text("SSV Schmidhausen Export", 14, 15);
    doc.autoTable({ head: [Object.keys(data[0])], body: data.map(v => Object.values(v)), startY: 20 });
    doc.save(`SSV_Export_${new Date().toISOString().split('T')[0]}.pdf`);
};

document.getElementById("_na").onclick = () => {
    document.getElementById("_a").style.display = "none";
    document.getElementById("_av").style.display = "block";
    document.getElementById("_na").classList.add("_ax");
    document.getElementById("_nu").classList.remove("_ax");
};
document.getElementById("_nu").onclick = () => {
    document.getElementById("_av").style.display = "none";
    document.getElementById("_a").style.display = "block";
    document.getElementById("_nu").classList.add("_ax");
    document.getElementById("_na").classList.remove("_ax");
};

function _startInactivityTimer() {
    let t;
    const r = () => { clearTimeout(t); t = setTimeout(() => { _c.auth.signOut(); location.reload(); }, 300000); };
    ['mousedown', 'keypress', 'touchstart'].forEach(e => window.addEventListener(e, r));
    r();
}

document.getElementById("_fp").onclick = e => {
    e.preventDefault();
    const d = prompt("E-Mail für Reset-Anfrage:");
    if (d) window.location.href = `mailto:C.Dorn1@gmx.de?subject=Reset&body=${d}`;
};
</script>
</body>
</html>
