<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schießnachweis</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Schießnachweis</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">
  <button id="loginBtn">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Neuer Eintrag</h3>

  <label for="datum">Datum: *</label><br>
  <input id="datum" type="date"><br>

  <label for="gastschuetze">Name Gastschütze: (Pflicht für Gäste)</label><br>
  <input id="gastschuetze" placeholder="Vor- und Nachname"><br> 

  <label for="stand">Schießstand: *</label><br>
  <select id="stand">
    <option value="">-- Bitte wählen --</option>
    <option value="Kurzwaffe">Kurzwaffe</option>
    <option value="Langwaffe">Langwaffe</option>
  </select><br>

  <label for="disziplin">Disziplin: *</label><br>
  <input id="disziplin" placeholder="z.B. WT4.1"><br>

  <label for="waffe">Waffe/Kaliber: *</label><br>
  <input id="waffe" placeholder="z.B. CZ Shadow 9mm"><br>

  <label for="aufsicht">Aufsicht: *</label><br>
  <input id="aufsicht" placeholder="Name der Aufsicht"><br>

  <label for="bemerkung">Bemerkung: (Optional)</label><br>
  <input id="bemerkung" placeholder="Sonstiges..."><br>

  <p><small>* Pflichtfelder</small></p>

  <button id="saveBtn">Speichern</button>

  <h3>Meine Einträge</h3>
  <ul id="list"></ul>
</div>

<script>
const client = window.supabase.createClient(
  "https://zgpjnjttafrpjcswpaff.supabase.co",
  "sb_publishable_NRbm9gXaYGUSjnqbqrqxdA_-dDCVvkX"
);

// LOGIN mit getrennten Fehlermeldungen
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    // Supabase gibt je nach Fehler unterschiedliche Texte zurück
    if (error.message.toLowerCase().includes("email")) {
      alert("Fehler: Die E-Mail-Adresse ist falsch oder nicht registriert.");
    } else if (error.message.toLowerCase().includes("invalid login credentials") || error.message.toLowerCase().includes("password")) {
      alert("Fehler: Das Passwort ist nicht korrekt.");
    } else {
      alert("Login-Fehler: " + error.message);
    }
  } else {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadEntries();
  }
}

// SPEICHERN mit Gast-Sonderregel
async function save() {
  const datumRaw = document.getElementById("datum").value;
  const stand = document.getElementById("stand").value;
  const disziplin = document.getElementById("disziplin").value.trim();
  const waffe = document.getElementById("waffe").value.trim();
  const aufsicht = document.getElementById("aufsicht").value.trim();
  const gastName = document.getElementById("gastschuetze").value.trim();
  const bemerkung = document.getElementById("bemerkung").value.trim();

  // --- PRÜFUNG: ZUKUNFT ---
  if (datumRaw) {
    const gewähltesDatum = new Date(datumRaw);
    const heute = new Date();
    heute.setHours(0, 0, 0, 0); // Uhrzeit auf Null setzen für reinen Datumsvergleich

    if (gewähltesDatum > heute) {
      alert("Fehler: Du kannst keine Einträge für die Zukunft erstellen!");
      return;
    }
  
  // 2. Check: Nur Mittwoch (3), Freitag (5) und Sonntag (0)
    // getDay() gibt 0 für Sonntag, 1 für Montag ... 3 für Mittwoch usw. zurück.
    const wochentag = gewähltesDatum.getDay();
    const erlaubteTage = [0, 3, 5]; // 0=So, 3=Mi, 5=Fr

    if (!erlaubteTage.includes(wochentag)) {
      alert("Fehler: Einträge sind nur für unsere Öffnungstage erlaubt (Mittwoch, Freitag oder Sonntag)!");
      return;
    }
  }

  // --- ALLGEMEINE PFLICHTFELDER ---
  if (!datumRaw || !stand || !disziplin || !waffe || !aufsicht) {
    alert("Bitte fülle alle Pflichtfelder aus (Datum, Stand-Typ, Disziplin, Waffe und Aufsicht).");
    return;
  }

  // --- GAST-REGEL ---
  const { data: { user } } = await client.auth.getUser();
  const userEmail = user.email.toLowerCase();

  if (userEmail === "gast@ssv.de" && gastName === "") {
    alert("Achtung: Als Gast-Account musst du den Namen des Gastschützen angeben!");
    return;
  }

  // --- SPEICHERN ---
  const { error } = await client.from("entries").insert([{
    user_id: user.id,
    datum: datumRaw,
    gastschuetze: gastName,
    schiessstand: stand,
    disziplin: disziplin,
    waffe: waffe,
    aufsicht: aufsicht,
    bemerkung: bemerkung
  }]);

  if (error) {
    alert("Fehler: " + error.message);
  } else {
    alert("Eintrag erfolgreich gespeichert!");
    // Felder zurücksetzen (außer Datum und Stand für schnellere Eingabe)
    document.getElementById("gastschuetze").value = "";
    document.getElementById("bemerkung").value = "";
    loadEntries();
  }
}

async function loadEntries() {
  const { data, error } = await client
    .from("entries")
    .select("*")
    .order("datum", { ascending: false });

  if (error) return;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(e => {
    const li = document.createElement("li");
    const gast = e.gastschuetze ? ` | Gast: ${e.gastschuetze}` : "";
    li.textContent = `${e.datum}${gast} | ${e.disziplin} | ${e.waffe}`;
    list.appendChild(li);
  });
}

document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("saveBtn").addEventListener("click", save);
</script>

</body>
</html>
